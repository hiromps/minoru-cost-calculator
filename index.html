<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ミノル化学｜精密原価・利益シミュレーター</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f9; color: #333; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-top: 8px solid #005caf; }
        h1 { font-size: 1.2rem; color: #005caf; text-align: center; margin-bottom: 20px; }
        .minoru-chan { background: #eef6ff; padding: 10px; border-radius: 8px; font-size: 0.9rem; margin-bottom: 20px; border-left: 4px solid #005caf; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.85rem; font-weight: bold; margin-bottom: 5px; color: #555; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 1rem; }
        .result-box { background: #005caf; color: #fff; padding: 20px; border-radius: 8px; margin-top: 20px; }
        .result-item { display: flex; justify-content: space-between; margin-bottom: 10px; border-bottom: 1px dotted rgba(255,255,255,0.3); padding-bottom: 5px; }
        .result-item:last-child { border-bottom: none; }
        .price { font-size: 1.4rem; font-weight: bold; }
        .hint { font-size: 0.75rem; margin-top: 10px; color: #eee; }
    </style>
</head>
<body>

<div class="container">
    <h1>利益計算シミュレーター</h1>
    
    <div class="minoru-chan">
        「1秒50銭（50c）の人件費も含めて、鉄壁の利益を守るのですよ！🛡️✨」
    </div>

    <div class="form-group">
        <label>1. 本体製造原価 (円)</label>
        <input type="number" id="base_cost" value="0" oninput="calculate()">
    </div>

    <div class="form-group">
        <label>2. 印刷代・セロハン・梱包資材 合計 (円)</label>
        <input type="number" id="material_cost" value="0" oninput="calculate()">
    </div>

    <div class="form-group">
        <label>3. 作業時間 (秒) <span style="color:red">※1秒0.5円換算</span></label>
        <input type="number" id="work_seconds" value="60" oninput="calculate()">
    </div>

    <div class="form-group">
        <label>4. 送料 ＋ BOSS手数料 合計 (円)</label>
        <input type="number" id="shipping_cost" value="700" oninput="calculate()">
    </div>

    <div class="form-group">
        <label>5. 確保したい利益 (円)</label>
        <input type="number" id="target_profit" value="300" oninput="calculate()">
    </div>

    <div class="result-box">
        <div class="result-item">
            <span>原価合計(人件費込):</span>
            <span><span id="total_cost_val">0</span> 円</span>
        </div>
        <div class="result-item" style="background: rgba(255,255,255,0.1); padding: 5px; border-radius: 4px;">
            <span>赤字にならない最低売価:</span>
            <span><span id="break_even_val">0</span> 円</span>
        </div>
        <div class="result-item" style="margin-top: 15px;">
            <span>推奨販売価格:</span>
            <span class="price"><span id="final_price_val">0</span> 円</span>
        </div>
        <p class="hint">※楽天手数料11%および目標利益を考慮しています！</p>
    </div>
</div>

<script>
    function calculate() {
        const base = parseFloat(document.getElementById('base_cost').value) || 0;
        const material = parseFloat(document.getElementById('material_cost').value) || 0;
        const seconds = parseFloat(document.getElementById('work_seconds').value) || 0;
        const shipping = parseFloat(document.getElementById('shipping_cost').value) || 0;
        const profit = parseFloat(document.getElementById('target_profit').value) || 0;

        const labor_cost = seconds * 0.5;
        const total_cost = base + material + labor_cost + shipping;
        const break_even = Math.ceil(total_cost / 0.89);
        const final_price = Math.ceil((total_cost + profit) / 0.89);

        document.getElementById('total_cost_val').innerText = total_cost.toLocaleString();
        document.getElementById('break_even_val').innerText = break_even.toLocaleString();
        document.getElementById('final_price_val').innerText = final_price.toLocaleString();
    }
    calculate();
</script>

</body>
</html>

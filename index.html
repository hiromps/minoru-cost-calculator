<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ミノル化学｜販売価格シミュレーター</title>
    <style>
        :root { --primary: #005caf; --bg: #f4f7f9; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background-color: var(--bg); color: #333; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border-top: 10px solid var(--primary); }
        h1 { font-size: 1.5rem; color: var(--primary); text-align: center; margin-bottom: 30px; }
        
        .section { margin-bottom: 25px; padding-bottom: 20px; border-bottom: 1px solid #eee; }
        .section:last-child { border-bottom: none; }
        h2 { font-size: 1rem; color: #666; margin-bottom: 15px; }

        .search-box { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 1rem; margin-bottom: 10px; }
        .product-list { max-height: 200px; overflow-y: auto; border: 1px solid #eee; border-radius: 8px; margin-bottom: 20px; display: none; }
        .product-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #f9f9f9; font-size: 0.9rem; }
        .product-item:hover { background: #eef6ff; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.8rem; font-weight: bold; margin-bottom: 5px; color: #555; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 1rem; background: #fff; }
        input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 3px rgba(0,92,175,0.1); }

        .result-card { background: var(--primary); color: #fff; padding: 25px; border-radius: 12px; margin-top: 30px; position: sticky; bottom: 20px; }
        .result-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .result-label { font-size: 0.9rem; opacity: 0.9; }
        .result-value { font-size: 1.2rem; font-weight: 600; }
        .main-price { font-size: 2rem; font-weight: 800; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 15px; margin-top: 10px; }
        
        .badge { background: #ff4757; color: white; padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; margin-left: 5px; vertical-align: middle; }
        .profit-pos { color: #2ed573; }
        .profit-neg { color: #ff4757; font-weight: bold; }
        
        .minoru-chan { background: #eef6ff; padding: 15px; border-radius: 12px; font-size: 0.9rem; margin-bottom: 25px; border-left: 5px solid var(--primary); line-height: 1.5; }
    </style>
</head>
<body>

<div class="container">
    <h1>販売価格シミュレーター</h1>
    
    <div class="minoru-chan">
        「エクセルの原価データを元に、最適な販売価格を見つけましょう！<br>
        <strong>1秒50銭</strong>の人件費と<strong>楽天手数料11%</strong>を自動で計算するのですよ！🛡️✨」
    </div>

    <div class="section">
        <h2>商品を選択してください</h2>
        <input type="text" id="search" class="search-box" placeholder="商品名やSKUで検索...">
        <div id="productList" class="product-list"></div>
        <div id="selectedInfo" style="font-size: 0.85rem; color: var(--primary); font-weight: bold; display: none;">
            選択中: <span id="currentProductName"></span>
        </div>
    </div>

    <div class="section">
        <h2>コスト詳細（自動入力・変更可能）</h2>
        <div class="grid">
            <div class="form-group">
                <label>製造原価 (円)</label>
                <input type="number" id="base_cost" value="0" step="0.1">
            </div>
            <div class="form-group">
                <label>出荷コスト（送料・BOSS等） (円)</label>
                <input type="number" id="shipping_cost" value="0" step="0.1">
            </div>
            <div class="form-group">
                <label>印刷・梱包資材 合計 (円)</label>
                <input type="number" id="material_cost" value="10" step="1">
            </div>
            <div class="form-group">
                <label>作業時間 (秒) <span class="badge">1秒0.5円</span></label>
                <input type="number" id="work_seconds" value="60">
            </div>
        </div>
    </div>

    <div class="section">
        <h2>目標・広告設定</h2>
        <div class="grid">
            <div class="form-group">
                <label>確保したい純利益 (円)</label>
                <input type="number" id="target_profit" value="300">
            </div>
            <div class="form-group">
                <label>広告費バッファ (販売価格の%)</label>
                <select id="ad_percent">
                    <option value="0">0% (広告なし)</option>
                    <option value="0.05">5% (控えめ)</option>
                    <option value="0.1" selected>10% (標準)</option>
                    <option value="0.15">15% (積極的)</option>
                    <option value="0.2">20% (勝負!)</option>
                </select>
            </div>
        </div>
    </div>

    <div class="result-card">
        <div class="result-row">
            <span class="result-label">人件費目安:</span>
            <span class="result-value"><span id="labor_cost_val">0</span> 円</span>
        </div>
        <div class="result-row">
            <span class="result-label">原価合計(楽天手数料除く):</span>
            <span class="result-value"><span id="total_cost_val">0</span> 円</span>
        </div>
        <div class="result-row">
            <span class="result-label">赤字ライン (楽天手数料のみ考慮):</span>
            <span class="result-value"><span id="break_even_val">0</span> 円</span>
        </div>
        <div class="result-row main-price">
            <span class="result-label">推奨販売価格:</span>
            <span class="result-value"><span id="final_price_val">0</span> 円</span>
        </div>
        <div style="font-size: 0.7rem; opacity: 0.8; margin-top: 10px; text-align: center;">
            ※計算式: (原価合計 + 目標利益) / (1 - 楽天0.11 - 広告費率)
        </div>
    </div>
</div>

<script>
    const products = [
      {
        "name": "【ミノルキューブ2個セット】【UVカット99%】【Sサイズ65×65×65mm】",
        "sku": "minorucube_uv_s",
        "base_cost": 210.0,
        "boss_cost": 495.42,
        "self_shipping": 0.0
      },
      {
        "name": "【ミノルキューブ2個セット】【UVカット99%】【Lサイズ97×97×97mm】",
        "sku": "minorucube_uv_l",
        "base_cost": 320.0,
        "boss_cost": 495.42,
        "self_shipping": 0.0
      },
      {
        "name": "【ミノルキューブ2個セット】【UVカット99%】【Sロングサイズ65×65×97mm】",
        "sku": "minorucube_uv_s_long",
        "base_cost": 246.01,
        "boss_cost": 495.42,
        "self_shipping": 0.0
      },
      {
        "name": "【ミノルキューブ2個セット】【UVカット99%】【Lロングサイズ97×97×162mm】",
        "sku": "minorucube_uv_l_long",
        "base_cost": 460.0,
        "boss_cost": 495.42,
        "self_shipping": 0.0
      },
      {
        "name": "【ミノルキューブ】【UVカット99%】【LLサイズ130×130×130mm】",
        "sku": "minorucube_uv_l_l",
        "base_cost": 295.0,
        "boss_cost": 495.42,
        "self_shipping": 0.0
      },
      {
        "name": "ミノルキューブ 5サイズ選べるスタンダード",
        "sku": "minorucube_1",
        "base_cost": 420.0,
        "boss_cost": 0.0,
        "self_shipping": 520.0
      }
    ];

    const searchInput = document.getElementById('search');
    const productList = document.getElementById('productList');
    const selectedInfo = document.getElementById('selectedInfo');
    const currentProductName = document.getElementById('currentProductName');

    function renderProducts(filter = '') {
        productList.innerHTML = '';
        const filtered = products.filter(p => p.name.includes(filter) || p.sku.includes(filter));
        filtered.forEach(p => {
            const div = document.createElement('div');
            div.className = 'product-item';
            div.innerText = `[${p.sku}] ${p.name.substring(0, 40)}...`;
            div.onclick = () => selectProduct(p);
            productList.appendChild(div);
        });
        productList.style.display = filter ? 'block' : 'none';
    }

    function selectProduct(p) {
        document.getElementById('base_cost').value = p.base_cost;
        document.getElementById('shipping_cost').value = p.boss_cost || p.self_shipping;
        currentProductName.innerText = p.sku + " : " + p.name.substring(0, 30);
        selectedInfo.style.display = 'block';
        productList.style.display = 'none';
        searchInput.value = '';
        calculate();
    }

    searchInput.oninput = (e) => renderProducts(e.target.value);

    function calculate() {
        const base = parseFloat(document.getElementById('base_cost').value) || 0;
        const shipping = parseFloat(document.getElementById('shipping_cost').value) || 0;
        const material = parseFloat(document.getElementById('material_cost').value) || 0;
        const seconds = parseFloat(document.getElementById('work_seconds').value) || 0;
        const profit = parseFloat(document.getElementById('target_profit').value) || 0;
        const ad_rate = parseFloat(document.getElementById('ad_percent').value) || 0;

        const labor_cost = seconds * 0.5;
        const total_cost = base + material + labor_cost + shipping;

        // 損益分岐 (楽天11%のみ)
        const break_even = Math.ceil(total_cost / 0.89);

        // 推奨価格 (利益 + 楽天11% + 広告費)
        const divisor = 1 - 0.11 - ad_rate;
        const final_price = Math.ceil((total_cost + profit) / divisor);

        document.getElementById('labor_cost_val').innerText = labor_cost.toLocaleString();
        document.getElementById('total_cost_val').innerText = total_cost.toLocaleString();
        document.getElementById('break_even_val').innerText = break_even.toLocaleString();
        document.getElementById('final_price_val').innerText = final_price.toLocaleString();
    }

    document.querySelectorAll('input, select').forEach(el => {
        el.oninput = calculate;
    });

    calculate();
</script>

</body>
</html>
